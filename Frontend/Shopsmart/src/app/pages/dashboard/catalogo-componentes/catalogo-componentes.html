<div class="catalogo-container">
  <h2>📦 Catálogo de Productos</h2>
  <p>Explora nuestra selección de productos disponibles en tienda.</p>

  <h3>Productos en Tienda</h3>
  <div class="grid-productos">
    <div class="product-card" *ngFor="let p of productos">
      <h4>{{ p.nombre }}</h4>
      <p>Precio: <span class="price">${{ p.precio }}</span></p>
      <p>Stock disponible: <strong>{{ p.stock }}</strong> unidades</p>   
      </div>
    </div>
  </div>
