<div class="catalogo-container">
  <div class="header-box">
    <h2>🛍️ Catálogo de Productos Disponibles</h2>
    <button class="btn-back" (click)="volverAlInicio()">← Volver al Menú</button>
    <button type="button" (click)="cargarProductos()" class="btn-actualizar">
  🔄 Actualizar Catálogo
</button>
  </div>

  <div *ngIf="loading" class="loading-state">
    <p>Consultando existencias de productos...</p>
  </div>

  <div class="grid-productos" *ngIf="!loading">
    <div class="product-card" *ngFor="let prod of productos">
      <div class="card-icon">📦</div>
      <h3>{{ prod.nombre }}</h3>
      <div class="card-info">
        <p class="price">Precio: <span>${{ prod.precio }}</span></p>
        <p class="stock">Disponibles: 
<strong [ngClass]="prod.stock === 0 ? 'out-of-stock' : 'in-stock'">
  {{ prod.stock > 0 ? prod.stock + ' unidades' : 'Agotado' }}
</strong>
        </p>
      </div>
      <button class="btn-buy" [disabled]="prod.stock === 0">
        {{ prod.stock > 0 ? 'Añadir al Carrito' : 'No disponible' }}
      </button>
    </div>
  </div>

  <div *ngIf="productos.length === 0 && !loading" class="empty-state">
    <p>No hay artículos registrados actualmente en el inventario .</p>
  </div>
</div>
