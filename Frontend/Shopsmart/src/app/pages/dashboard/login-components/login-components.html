<div class="login-container">

  <div class="login-card">

    <div class="brand">

      <div class="logo">
        S
      </div>

      <h1>ShopSmart</h1>

      <p>
        Plataforma inteligente para gestionar compras
      </p>

    </div>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="login()"
    >

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          formControlName="email"
          placeholder="correo@empresa.com"
        >

      </div>

      <div class="form-group">

        <label>Contraseña</label>

        <input
          type="password"
          formControlName="password"
          placeholder="********"
        >

      </div>

      <button
        type="submit"
        class="login-btn"
        [disabled]="loading"
      >

        {{ loading ? 'Ingresando...' : 'Ingresar' }}

      </button>

      <div class="register-section">

        <span>
          ¿No tienes cuenta?
        </span>

        <button
          type="button"
          class="register-btn"
          (click)="goToRegister()"
        >
          Crear cuenta
        </button>

      </div>

    </form>

  </div>

</div>
