<div class="register-container">

  <div class="register-card">

    <div class="brand">

      <div class="logo">
        S
      </div>

      <h1>Crear Cuenta</h1>

      <p>
        Únete a ShopSmart y comienza a gestionar
        tus compras de manera inteligente
      </p>

    </div>

    <form
      [formGroup]="registerForm"
      (ngSubmit)="register()"
    >

      <div class="form-group">

        <label>Nombre</label>

        <input
          type="text"
          formControlName="nombre"
          placeholder="Tu nombre"
        >

      </div>

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          formControlName="email"
          placeholder="correo@empresa.com"
        >

      </div>

      <div class="form-group">

        <label>Contraseña</label>

        <input
          type="password"
          formControlName="password"
          placeholder="********"
        >

      </div>

      <button
        type="submit"
        class="register-btn"
        [disabled]="loading"
      >

        {{ loading ? 'Creando...' : 'Registrarse' }}

      </button>

      <div class="login-section">

        <span>
          ¿Ya tienes cuenta?
        </span>

        <button
          type="button"
          class="login-btn"
          (click)="goToLogin()"
        >
          Iniciar Sesión
        </button>

      </div>

    </form>

  </div>

</div>
