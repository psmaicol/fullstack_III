spring.application.name=shopsmart
#Configuración de conexión a Supabase (PostgreSQL)
spring.datasource.url=jdbc:postgresql://[TU_HOST_DE_SUPABASE]:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=[TU_PASSWORD_DE_SUPABASE]

# Esto le dice a Spring Boot que cree la tabla automáticamente si no existe
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect